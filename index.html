<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>济南公交新版线路图生成器 v1.0.0</title>
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        @font-face {
            font-family: 'Arial Black';
            src: url('ariblk.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Source Han Sans Bold';
            src: url('SourceHansansSC-Bold-2.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #2d2d2d;
            overflow: hidden;
        }
        .control-panel-wrapper {
            position: relative;
            height: 100vh;
            display: flex;
            flex-shrink: 0;
            transition: width 0.2s;
            width: 520px;
            z-index: 200;
            touch-action: pan-y; /* 允许垂直滚动 */
        }
        .control-panel-wrapper.collapsed {
            width: 50px;
        }
        .control-panel-wrapper.collapsed .control-panel {
            display: none;
        }
        .control-panel-wrapper.collapsed .collapsed-tab {
            display: flex;
        }
        .collapsed-tab {
            width: 50px;
            height: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(2px);
            border-right: 1px solid rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            cursor: pointer;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            touch-action: pan-y;
        }
        .collapsed-tab span {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 18px;
            font-weight: bold;
            color: #1e2b3a;
            margin-top: 20px;
        }
        .control-panel {
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(2px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            border-right: 1px solid rgba(255,255,255,0.2);
            box-shadow: 4px 0 20px rgba(0,0,0,0.5);
            touch-action: pan-y; /* 确保垂直滚动 */
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .collapse-btn {
            background: #2a7de1;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation; /* 优化触摸点击 */
        }
        .panel-title {
            font-weight: bold;
            font-size: 16px;
            color: #1e2b3a;
        }
        .resize-handle {
            width: 8px;
            height: 30px;
            background: #ccc;
            border-radius: 4px;
            cursor: ew-resize;
            opacity: 0.6;
            transition: 0.2s;
            touch-action: none; /* 拖拽区域禁用触摸动作 */
        }
        .resize-handle:hover {
            opacity: 1;
            background: #2a7de1;
        }
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 2px solid #2a7de1;
            padding-bottom: 8px;
        }
        .tab-btn {
            padding: 8px 16px;
            background: #e0e7ff;
            border: none;
            border-radius: 20px 20px 0 0;
            cursor: pointer;
            font-weight: 600;
            color: #1e2b3a;
            transition: 0.2s;
            touch-action: manipulation;
        }
        .tab-btn.active {
            background: #2a7de1;
            color: white;
        }
        .tab-page { display: block; }
        .tab-page.hidden { display: none; }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 15px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 13px;
            color: #3a4a5a;
            text-transform: uppercase;
        }
        .input-group input, .input-group select {
            padding: 10px 12px;
            border: 1px solid #ccd7e4;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            touch-action: manipulation;
        }
        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: white;
            color: #1e2b3a;
            border: 1px solid #cbd5e1;
            touch-action: manipulation;
        }
        .btn-add {
            background: #2a7de1;
            color: white;
            border: none;
        }
        .btn-clear {
            background: #f1f5f9;
            color: #475569;
        }
        .btn-disabled {
            background: #aaa;
            color: #eee;
            cursor: not-allowed;
            border: 1px solid #888;
            pointer-events: auto; /* 仍允许点击触发弹窗 */
        }
        hr {
            border: 1px solid #e9eef2;
            width: 100%;
            margin: 8px 0;
        }
        .stations-list {
            border-radius: 18px;
            padding: 16px 12px;
            background: #f8fafc;
            border: 1px solid #dee7ef;
            overflow-y: auto;
            max-height: 500px;
            touch-action: pan-y; /* 允许列表垂直滚动 */
        }
        .stations-list-header {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 12px;
        }
        .station-item {
            display: flex;
            flex-direction: column;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 16px;
            gap: 8px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            cursor: default;
            touch-action: pan-y; /* 不影响内部滚动 */
        }
        .station-item.main { background-color: #e6f7e6; }
        .station-item.sub { background-color: #e6f0ff; }
        .station-item.middle { background-color: white; }
        .station-item.middle { cursor: grab; }
        .station-item.middle:active { cursor: grabbing; }
        .station-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .station-name-input {
            flex: 2;
            min-width: 140px;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 30px;
            font-size: 14px;
            background: white;
            color: black;
            pointer-events: auto;
            cursor: text;
            touch-action: manipulation;
        }
        .direction-buttons {
            display: flex;
            gap: 4px;
        }
        .dir-btn {
            background: none;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            width: 36px;
            height: 36px;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            background: white;
            touch-action: manipulation;
        }
        .dir-btn.active {
            background: #2a7de1;
            color: white;
            border-color: #2a7de1;
        }
        .metro-section {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 40px;
            overflow-x: auto;
            touch-action: pan-x; /* 允许水平滚动 */
        }
        .metro-label {
            font-weight: bold;
            color: #1e2b3a;
            margin-right: 4px;
            font-size: 13px;
            white-space: nowrap;
        }
        .metro-checkbox {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 13px;
            white-space: nowrap;
        }
        .metro-checkbox input {
            width: 16px;
            height: 16px;
            margin: 0;
        }
        .brt-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }
        .brt-checkbox {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
        }
        .brt-checkbox input {
            width: 18px;
            height: 18px;
        }
        .btn-delete {
            background: none;
            border: none;
            color: #f43f5e;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            padding: 0 6px;
            border-radius: 30px;
            margin-left: auto;
            touch-action: manipulation;
        }
        .btn-delete:hover {
            background: #fee2e2;
        }
        .batch-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            align-items: center;
        }
        .batch-input {
            flex: 1;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        .canvas-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: #2d2d2d;
            cursor: grab;
            touch-action: none; /* 禁止默认触摸滚动，由我们自己处理 */
        }
        .canvas-area.dragging {
            cursor: grabbing;
        }
        #map-container {
            position: absolute;
            left: 0;
            top: 0;
            width: 2415px;
            height: 689px;
            margin: 0;
            transform-origin: 0 0;
            transition: transform 0.1s;
            will-change: transform;
        }
        #bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 2415px;
            height: 689px;
            z-index: 1;
            user-select: none;
            pointer-events: none;
        }
        #route-svg { display: none; }
        #text-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 2415px;
            height: 689px;
            z-index: 90;
            pointer-events: none;
        }
        .station-marker {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }
        .station-icon {
            width: 32px;
            height: 32px;
            display: block;
        }
        .station-label {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-family: 'Source Han Sans Bold', '思源黑体 Bold', 'Noto Sans CJK SC Bold', 'Microsoft YaHei', sans-serif;
            font-weight: bold;
            font-size: 25.72px;
            color: black;
            white-space: nowrap;
            background: none;
            border: none;
            padding: 0;
            line-height: 1.2;
            margin-top: 4px;
        }
        .brt-marker {
            width: 32px;
            height: 26px;
            margin-top: 2px;
            object-fit: contain;
        }
        .metro-marker {
            position: absolute;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            z-index: 102;
            pointer-events: none;
        }
        .metro-marker img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .control-panel-wrapper {
                width: 100% !important;
                height: 60vh;
                max-height: 500px;
            }
            .resize-handle {
                display: none;
            }
            .control-panel {
                padding: 12px;
                gap: 10px;
            }
            .panel-header .panel-title {
                font-size: 14px;
            }
            .stations-list {
                max-height: 200px;
            }
            .station-name-input {
                font-size: 13px;
                padding: 6px 8px;
            }
            .dir-btn {
                width: 32px;
                height: 32px;
                font-size: 13px;
            }
            .metro-checkbox {
                font-size: 12px;
            }
            .btn {
                padding: 10px 12px;
                font-size: 13px;
            }
            .canvas-area {
                flex: 1;
                height: 40vh;
            }
        }
    </style>
</head>
<body>
    <div class="control-panel-wrapper" id="panelWrapper">
        <div class="collapsed-tab" id="collapsedTab" onclick="togglePanel()">
            <span>线路图</span>
        </div>
        <div class="control-panel" id="controlPanel">
            <div class="panel-header">
                <button class="collapse-btn" onclick="togglePanel()">◀</button>
                <span class="panel-title">济南公交新版线路图生成器 v1.0.0</span>
                <div class="resize-handle" id="resizeHandle"></div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" id="tabLineBtn">线路信息</button>
                <button class="tab-btn" id="tabStationBtn">站点信息</button>
            </div>
            <div id="linePage" class="tab-page">
                <h3 style="margin:0 0 10px;">线路信息</h3>
                <div class="input-group">
                    <label>线路号</label>
                    <input type="text" id="lineNo" value="B53">
                </div>
                <div class="input-group">
                    <label>主站</label>
                    <input type="text" id="startChinese" value="大坝公交车场">
                </div>
                <div class="input-group">
                    <label>主站英文</label>
                    <input type="text" id="startStation" value="Daba Bus Station">
                </div>
                <div class="input-group">
                    <label>副站</label>
                    <input type="text" id="endChinese" value="地铁燕山立交桥站">
                </div>
                <div class="input-group">
                    <label>副站英文</label>
                    <input type="text" id="endStation" value="Yanshan Flyover Metro Station">
                </div>
                <hr>
                <button class="btn btn-clear" onclick="clearAll()">清空重置</button>
            </div>
            <div id="stationPage" class="tab-page hidden">
                <h3 style="margin:0 0 10px;">站点列表 (拖拽中间站可排序)</h3>
                <div class="stations-list" id="stationsContainer"></div>
                <div style="margin-top:16px; display:flex; gap:8px;">
                    <input type="text" id="newStationName" placeholder="新中间站名" style="flex:1; padding:10px; border-radius:30px; border:1px solid #ccc;">
                    <button class="btn btn-add" onclick="addStation()">添加</button>
                </div>
                <div class="batch-row">
                    <input type="text" id="batchNames" class="batch-input" placeholder="批量添加 (用中文逗号分隔)">
                    <button class="btn btn-add" onclick="batchAdd()">批量添加</button>
                </div>
                <div style="margin-top:8px; display:flex; gap:8px;">
                    <button class="btn btn-clear" onclick="deleteAllStations()">删除全部中间站</button>
                </div>
                <div style="margin-top:16px; display:flex; gap:8px; flex-wrap:wrap;">
                    <button class="btn btn-disabled" id="exportBtn">导出PNG</button>
                    <button class="btn btn-add" onclick="exportSave()">导出存档</button>
                    <button class="btn btn-add" onclick="document.getElementById('importFile').click()">导入存档</button>
                    <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importSave(event)">
                </div>
            </div>
        </div>
    </div>
    <div class="canvas-area" id="canvasArea">
        <div id="map-container">
            <img id="bg-layer" src="background.png" alt="线路图背景">
            <svg id="text-svg"></svg>
            <svg id="route-svg" style="display:none"></svg>
        </div>
    </div>
    <script>
        const MAP_WIDTH = 2415;
        const FIXED_START_X = 128;
        const FIXED_END_X = 2275;
        const FIXED_Y = 267;
        const METRO_BASE_Y = 229.5;
        const ICON_SIZE = 32;

        let stations = [];
        let mainStation = { name: '主站', metroLines: [], isBRT: false };
        let subStation = { name: '副站', metroLines: [], isBRT: false };

        const IMAGE_MAIN = 'zhuzhan.png';
        const IMAGE_SUB = 'fuzhan.png';
        const IMAGE_UP = 'shangxing.png';
        const IMAGE_DOWN = 'xiaxing.png';
        const IMAGE_BOTH = 'shuangxiang.png';
        const METRO_IMG = { 1:'line1.png', 2:'line2.png', 3:'line3.png', 4:'line4.png', 6:'line6.png', 8:'line8.png' };
        const BRT_IMG = 'BRT.png';

        let scale = 1.0;
        let translateX = 0;
        let translateY = 0;
        const MIN_SCALE = 0.1;
        const MAX_SCALE = 10;

        const panelWrapper = document.getElementById('panelWrapper');
        const controlPanel = document.getElementById('controlPanel');
        const collapsedTab = document.getElementById('collapsedTab');
        const resizeHandle = document.getElementById('resizeHandle');
        const canvasArea = document.getElementById('canvasArea');
        const mapContainer = document.getElementById('map-container');

        const lineNoInput = document.getElementById('lineNo');
        const startChineseInput = document.getElementById('startChinese');
        const startEnglishInput = document.getElementById('startStation');
        const endChineseInput = document.getElementById('endChinese');
        const endEnglishInput = document.getElementById('endStation');
        const newStationInput = document.getElementById('newStationName');
        const stationsContainer = document.getElementById('stationsContainer');
        const tabLineBtn = document.getElementById('tabLineBtn');
        const tabStationBtn = document.getElementById('tabStationBtn');
        const linePage = document.getElementById('linePage');
        const stationPage = document.getElementById('stationPage');

        document.getElementById('exportBtn').addEventListener('click', function(e) {
            e.preventDefault();
            alert('该功能暂不开启');
        });

        function applyTransform() {
            mapContainer.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        // 鼠标拖拽
        let isDraggingCanvas = false;
        let startTranslateX, startTranslateY, startMouseX, startMouseY;

        canvasArea.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            e.preventDefault();
            isDraggingCanvas = true;
            canvasArea.classList.add('dragging');
            startTranslateX = translateX;
            startTranslateY = translateY;
            startMouseX = e.clientX;
            startMouseY = e.clientY;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDraggingCanvas) return;
            const dx = e.clientX - startMouseX;
            const dy = e.clientY - startMouseY;
            translateX = startTranslateX + dx;
            translateY = startTranslateY + dy;
            applyTransform();
        });

        document.addEventListener('mouseup', () => {
            isDraggingCanvas = false;
            canvasArea.classList.remove('dragging');
        });

        // 触摸事件：支持单指平移和双指缩放
        let isPinching = false;
        let initialPinchDistance = 0;
        let pinchCenterX = 0, pinchCenterY = 0;
        let scaleAtPinchStart = 1;

        function getPinchDistance(touches) {
            if (touches.length < 2) return 0;
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function getPinchCenter(touches) {
            if (touches.length < 2) return { x: 0, y: 0 };
            return {
                x: (touches[0].clientX + touches[1].clientX) / 2,
                y: (touches[0].clientY + touches[1].clientY) / 2
            };
        }

        canvasArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touches = e.touches;
            if (touches.length === 2) {
                // 开始双指缩放
                isPinching = true;
                initialPinchDistance = getPinchDistance(touches);
                const center = getPinchCenter(touches);
                pinchCenterX = center.x;
                pinchCenterY = center.y;
                scaleAtPinchStart = scale;
                canvasArea.classList.add('dragging');
            } else if (touches.length === 1) {
                // 开始单指平移
                isDraggingCanvas = true;
                canvasArea.classList.add('dragging');
                startTranslateX = translateX;
                startTranslateY = translateY;
                startMouseX = touches[0].clientX;
                startMouseY = touches[0].clientY;
            }
        }, { passive: false });

        canvasArea.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touches = e.touches;
            if (isPinching && touches.length >= 2) {
                // 缩放
                const currentDistance = getPinchDistance(touches);
                if (currentDistance > 0 && initialPinchDistance > 0) {
                    const newScale = scaleAtPinchStart * (currentDistance / initialPinchDistance);
                    scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));
                    
                    // 调整平移量使缩放中心为双指中心
                    const center = getPinchCenter(touches);
                    const dx = center.x - pinchCenterX;
                    const dy = center.y - pinchCenterY;
                    // 根据缩放比例调整平移，保持中心点不变
                    translateX = startTranslateX + dx - (center.x - pinchCenterX) * (scale / scaleAtPinchStart - 1) * (MAP_WIDTH / 2); // 简化处理，实际需要更精确的计算
                    translateY = startTranslateY + dy - (center.y - pinchCenterY) * (scale / scaleAtPinchStart - 1) * (MAP_HEIGHT / 2);
                    // 简化版本，以左上角为基点，但配合平移可大致保持中心
                    // 更好的做法是计算旧中心到新中心的映射
                    // 为了简化，我们直接使用下面的公式
                    // 旧中心点相对于画布的坐标
                    const oldCenterX = (pinchCenterX - startTranslateX) / scaleAtPinchStart;
                    const oldCenterY = (pinchCenterY - startTranslateY) / scaleAtPinchStart;
                    // 新中心点应该对齐到当前触摸中心
                    translateX = center.x - oldCenterX * scale;
                    translateY = center.y - oldCenterY * scale;
                    
                    applyTransform();
                }
            } else if (isDraggingCanvas && touches.length === 1) {
                // 平移
                const dx = touches[0].clientX - startMouseX;
                const dy = touches[0].clientY - startMouseY;
                translateX = startTranslateX + dx;
                translateY = startTranslateY + dy;
                applyTransform();
            }
        }, { passive: false });

        canvasArea.addEventListener('touchend', (e) => {
            e.preventDefault();
            isDraggingCanvas = false;
            isPinching = false;
            canvasArea.classList.remove('dragging');
        }, { passive: false });

        canvasArea.addEventListener('touchcancel', (e) => {
            e.preventDefault();
            isDraggingCanvas = false;
            isPinching = false;
            canvasArea.classList.remove('dragging');
        }, { passive: false });

        // 鼠标滚轮缩放（桌面）
        canvasArea.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale *= delta;
            if (scale < MIN_SCALE) scale = MIN_SCALE;
            if (scale > MAX_SCALE) scale = MAX_SCALE;
            applyTransform();
        });

        window.togglePanel = function() {
            panelWrapper.classList.toggle('collapsed');
            const collapseBtn = document.querySelector('.collapse-btn');
            if (collapseBtn) {
                collapseBtn.textContent = panelWrapper.classList.contains('collapsed') ? '▶' : '◀';
            }
        };

        let startX, startWidth;
        resizeHandle.addEventListener('mousedown', function(e) {
            startX = e.clientX;
            startWidth = panelWrapper.offsetWidth;
            document.addEventListener('mousemove', resizeMove);
            document.addEventListener('mouseup', resizeStop);
            e.preventDefault();
        });

        function resizeMove(e) {
            let newWidth = startWidth + (e.clientX - startX);
            if (newWidth < 150) newWidth = 150;
            if (newWidth > 800) newWidth = 800;
            panelWrapper.style.width = newWidth + 'px';
        }

        function resizeStop() {
            document.removeEventListener('mousemove', resizeMove);
            document.removeEventListener('mouseup', resizeStop);
        }

        tabLineBtn.addEventListener('click', () => {
            tabLineBtn.classList.add('active');
            tabStationBtn.classList.remove('active');
            linePage.classList.remove('hidden');
            stationPage.classList.add('hidden');
        });
        tabStationBtn.addEventListener('click', () => {
            tabStationBtn.classList.add('active');
            tabLineBtn.classList.remove('active');
            stationPage.classList.remove('hidden');
            linePage.classList.add('hidden');
            renderStationsList();
        });

        function renderStationsList() {
            const container = stationsContainer;
            container.innerHTML = '';

            const mainDiv = createStationItem('main', mainStation, true);
            container.appendChild(mainDiv);

            stations.forEach((station, index) => {
                const middleDiv = createStationItem('middle', station, false, index);
                container.appendChild(middleDiv);
            });

            const subDiv = createStationItem('sub', subStation, true);
            container.appendChild(subDiv);

            new Sortable(container, {
                animation: 150,
                handle: '.station-item.middle',
                onEnd: (evt) => {
                    const oldIndex = evt.oldIndex;
                    const newIndex = evt.newIndex;
                    
                    if (newIndex === 0) {
                        const movedStation = stations[oldIndex - 1];
                        if (movedStation) {
                            const oldMain = { 
                                name: mainStation.name, 
                                metroLines: [...mainStation.metroLines], 
                                isBRT: mainStation.isBRT,
                                direction: 'both'
                            };
                            stations.splice(oldIndex - 1, 1);
                            stations.splice(oldIndex - 1, 0, oldMain);
                            mainStation = { 
                                name: movedStation.name, 
                                metroLines: [...movedStation.metroLines], 
                                isBRT: movedStation.isBRT 
                            };
                            renderStationsList();
                            updateDisplay();
                        }
                        return;
                    }
                    
                    if (newIndex === stations.length + 1) {
                        const movedStation = stations[oldIndex - 1];
                        if (movedStation) {
                            const oldSub = { 
                                name: subStation.name, 
                                metroLines: [...subStation.metroLines], 
                                isBRT: subStation.isBRT,
                                direction: 'both'
                            };
                            stations.splice(oldIndex - 1, 1);
                            stations.splice(oldIndex - 1, 0, oldSub);
                            subStation = { 
                                name: movedStation.name, 
                                metroLines: [...movedStation.metroLines], 
                                isBRT: movedStation.isBRT 
                            };
                            renderStationsList();
                            updateDisplay();
                        }
                        return;
                    }
                    
                    const oldMiddleIndex = oldIndex - 1;
                    const newMiddleIndex = newIndex - 1;
                    if (oldMiddleIndex !== newMiddleIndex && oldMiddleIndex >= 0 && newMiddleIndex >= 0 && oldMiddleIndex < stations.length && newMiddleIndex < stations.length) {
                        const moved = stations.splice(oldMiddleIndex, 1)[0];
                        stations.splice(newMiddleIndex, 0, moved);
                        renderStationsList();
                        updateDisplay();
                    }
                }
            });
        }

        function createStationItem(type, data, isFixed, index = null) {
            const div = document.createElement('div');
            div.className = `station-item ${type}`;

            const row1 = document.createElement('div');
            row1.className = 'station-row';

            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.className = 'station-name-input';
            nameInput.value = data.name;
            nameInput.addEventListener('input', (e) => {
                data.name = e.target.value;
                updateDisplay();
            });
            nameInput.setAttribute('autocomplete', 'off');
            nameInput.setAttribute('spellcheck', 'false');
            row1.appendChild(nameInput);

            if (type === 'middle') {
                const btnGroup = document.createElement('div');
                btnGroup.className = 'direction-buttons';
                const upBtn = document.createElement('button');
                upBtn.className = `dir-btn ${data.direction === 'up' ? 'active' : ''}`;
                upBtn.innerHTML = '上';
                upBtn.onclick = (e) => { e.stopPropagation(); data.direction = 'up'; renderStationsList(); updateDisplay(); };
                const downBtn = document.createElement('button');
                downBtn.className = `dir-btn ${data.direction === 'down' ? 'active' : ''}`;
                downBtn.innerHTML = '下';
                downBtn.onclick = (e) => { e.stopPropagation(); data.direction = 'down'; renderStationsList(); updateDisplay(); };
                const bothBtn = document.createElement('button');
                bothBtn.className = `dir-btn ${data.direction === 'both' ? 'active' : ''}`;
                bothBtn.innerHTML = '双';
                bothBtn.onclick = (e) => { e.stopPropagation(); data.direction = 'both'; renderStationsList(); updateDisplay(); };
                btnGroup.appendChild(upBtn);
                btnGroup.appendChild(downBtn);
                btnGroup.appendChild(bothBtn);
                row1.appendChild(btnGroup);
            }

            if (type === 'middle') {
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-delete';
                deleteBtn.innerHTML = '✕';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    stations.splice(index, 1);
                    renderStationsList();
                    updateDisplay();
                };
                row1.appendChild(deleteBtn);
            }

            div.appendChild(row1);

            const metroDiv = document.createElement('div');
            metroDiv.className = 'metro-section';
            const metroLabel = document.createElement('span');
            metroLabel.className = 'metro-label';
            metroLabel.textContent = '地铁换乘线:';
            metroDiv.appendChild(metroLabel);

            const lines = [1,2,3,4,6,8];
            lines.forEach(ln => {
                const label = document.createElement('label');
                label.className = 'metro-checkbox';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = ln;
                cb.checked = data.metroLines.includes(ln);
                cb.addEventListener('change', () => {
                    if (cb.checked) {
                        if (!data.metroLines.includes(ln)) data.metroLines.push(ln);
                    } else {
                        data.metroLines = data.metroLines.filter(v => v !== ln);
                    }
                    updateDisplay();
                });
                label.appendChild(cb);
                label.appendChild(document.createTextNode(ln));
                metroDiv.appendChild(label);
            });
            div.appendChild(metroDiv);

            const brtRow = document.createElement('div');
            brtRow.className = 'brt-row';
            const brtLabel = document.createElement('label');
            brtLabel.className = 'brt-checkbox';
            const brtCb = document.createElement('input');
            brtCb.type = 'checkbox';
            brtCb.checked = data.isBRT || false;
            brtCb.addEventListener('change', () => {
                data.isBRT = brtCb.checked;
                updateDisplay();
            });
            brtLabel.appendChild(brtCb);
            brtLabel.appendChild(document.createTextNode('BRT站点'));
            brtRow.appendChild(brtLabel);
            div.appendChild(brtRow);

            return div;
        }

        window.addStation = function() {
            const name = newStationInput.value.trim();
            if (name) {
                stations.push({ name: name, direction: 'both', metroLines: [], isBRT: false });
                newStationInput.value = '';
                renderStationsList();
                updateDisplay();
            }
        };

        window.batchAdd = function() {
            const input = document.getElementById('batchNames');
            const namesStr = input.value.trim();
            if (!namesStr) return;
            const names = namesStr.split(/[,，]\s*/).map(s => s.trim()).filter(s => s);
            names.forEach(name => {
                stations.push({ name: name, direction: 'both', metroLines: [], isBRT: false });
            });
            input.value = '';
            renderStationsList();
            updateDisplay();
        };

        window.deleteAllStations = function() {
            if (confirm('确定要删除所有中间站吗？')) {
                stations = [];
                renderStationsList();
                updateDisplay();
            }
        };

        window.clearAll = function() {
            if (confirm('确定要清空所有内容吗？')) {
                stations = [];
                mainStation = { name: '主站', metroLines: [], isBRT: false };
                subStation = { name: '副站', metroLines: [4], isBRT: false };
                lineNoInput.value = 'B53';
                startChineseInput.value = '大坝公交车场';
                startEnglishInput.value = 'Daba Bus Station';
                endChineseInput.value = '地铁燕山立交桥站';
                endEnglishInput.value = 'Yanshan Flyover Metro Station';
                renderStationsList();
                updateDisplay();
            }
        };

        function redrawCanvas() {
            const mapContainer = document.getElementById('map-container');
            const oldMarkers = mapContainer.querySelectorAll('.station-marker, .metro-marker');
            oldMarkers.forEach(m => m.remove());

            const startName = startEnglishInput.value;
            const endName = endEnglishInput.value;

            const drawList = [];

            drawList.push({
                type: 'main',
                name: mainStation.name,
                x: FIXED_START_X,
                metroLines: mainStation.metroLines || [],
                isBRT: mainStation.isBRT || false
            });

            stations.forEach(s => {
                drawList.push({
                    type: 'middle',
                    name: s.name,
                    direction: s.direction,
                    x: null,
                    metroLines: s.metroLines || [],
                    isBRT: s.isBRT || false
                });
            });

            drawList.push({
                type: 'sub',
                name: subStation.name,
                x: FIXED_END_X,
                metroLines: subStation.metroLines || [],
                isBRT: subStation.isBRT || false
            });

            const startNameExists = startName !== '';
            const endNameExists = endName !== '';
            const middleIndices = [];
            drawList.forEach((item, idx) => { if (item.type === 'middle') middleIndices.push(idx); });
            const middleCount = middleIndices.length;
            if (middleCount > 0) {
                let effectiveStartX = startNameExists ? FIXED_START_X : 40;
                let effectiveEndX = endNameExists ? FIXED_END_X : MAP_WIDTH - 40;
                if (!startNameExists && !endNameExists) {
                    effectiveStartX = 40;
                    effectiveEndX = MAP_WIDTH - 40;
                }
                for (let i = 0; i < middleCount; i++) {
                    const t = (i + 1) / (middleCount + 1);
                    const x = effectiveStartX + (effectiveEndX - effectiveStartX) * t;
                    drawList[middleIndices[i]].x = x;
                }
            }

            drawList.forEach(item => {
                if (item.x === undefined || item.x === null) return;

                const marker = document.createElement('div');
                marker.className = 'station-marker';
                marker.style.left = (item.x - ICON_SIZE/2) + 'px';
                marker.style.top = (FIXED_Y - ICON_SIZE/2) + 'px';

                let imgSrc = '';
                if (item.type === 'main') imgSrc = IMAGE_MAIN;
                else if (item.type === 'sub') imgSrc = IMAGE_SUB;
                else {
                    if (item.direction === 'up') imgSrc = IMAGE_UP;
                    else if (item.direction === 'down') imgSrc = IMAGE_DOWN;
                    else imgSrc = IMAGE_BOTH;
                }

                const iconImg = document.createElement('img');
                iconImg.className = 'station-icon';
                iconImg.src = imgSrc;
                iconImg.alt = item.name;
                iconImg.onerror = () => { console.error('图标加载失败:', imgSrc); };
                marker.appendChild(iconImg);

                const label = document.createElement('div');
                label.className = 'station-label';
                label.textContent = item.name;
                marker.appendChild(label);

                if (item.isBRT) {
                    const brtImg = document.createElement('img');
                    brtImg.className = 'brt-marker';
                    brtImg.src = BRT_IMG;
                    brtImg.alt = 'BRT';
                    brtImg.onerror = () => { console.error('BRT图标加载失败:', BRT_IMG); };
                    marker.appendChild(brtImg);
                }

                mapContainer.appendChild(marker);
            });

            drawList.forEach(item => {
                if (item.x === undefined || item.x === null) return;
                const lines = item.metroLines || [];
                if (lines.length === 0) return;
                lines.forEach((lineNum, idx) => {
                    const metroY = METRO_BASE_Y - 37 * (lines.length - 1 - idx);
                    const metroMarker = document.createElement('div');
                    metroMarker.className = 'metro-marker';
                    metroMarker.style.left = item.x + 'px';
                    metroMarker.style.top = metroY + 'px';

                    const metroImg = document.createElement('img');
                    const metroFile = METRO_IMG[lineNum];
                    if (metroFile) {
                        metroImg.src = metroFile;
                        metroImg.alt = `line${lineNum}`;
                        metroImg.onerror = () => { console.error('地铁图标加载失败:', metroFile); };
                    }
                    metroMarker.appendChild(metroImg);
                    mapContainer.appendChild(metroMarker);
                });
            });
        }

        function getTextWidth(text, fontSizePx, fontFamily) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.font = `${fontSizePx}px ${fontFamily}`;
            return ctx.measureText(text).width;
        }

        function updateTextLayer() {
            const svg = document.getElementById('text-svg');
            svg.innerHTML = '';

            const startChinese = startChineseInput.value || '';
            const endChinese = endChineseInput.value || '';
            const startEnglish = startEnglishInput.value || '';
            const endEnglish = endEnglishInput.value || '';
            const lineNo = lineNoInput.value || 'B53';

            const chineseFontFamily = '"Source Han Sans Bold", "思源黑体 Bold", "Noto Sans CJK SC Bold", "Microsoft YaHei", sans-serif';
            const englishFontFamily = '"Source Han Sans Bold", "思源黑体 Bold", "Noto Sans CJK SC Bold", "Microsoft YaHei", sans-serif';
            const lineNoFontFamily = '"Arial Black", "Arial Black", sans-serif';

            const chineseFontSize = 53;
            const englishFontSize = 22;
            const lineNoFontSize = 90;

            const startChineseWidth = getTextWidth(startChinese, chineseFontSize, chineseFontFamily);
            const endChineseWidth = getTextWidth(endChinese, chineseFontSize, chineseFontFamily);
            const dashWidth = getTextWidth('—', chineseFontSize, chineseFontFamily);

            const gap = 10;
            const startChineseX = 949;
            const chineseY = 97;
            const dashX = startChineseX + startChineseWidth + gap;
            const endChineseX = dashX + dashWidth + gap;
            const englishY = 121;

            const preservedStartEnglish = startEnglish.replace(/ /g, '\u00A0');
            const preservedEndEnglish = endEnglish.replace(/ /g, '\u00A0');

            if (startChinese) {
                const startChineseText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                startChineseText.setAttribute('x', startChineseX);
                startChineseText.setAttribute('y', chineseY);
                startChineseText.setAttribute('dominant-baseline', 'middle');
                startChineseText.setAttribute('font-size', chineseFontSize + 'px');
                startChineseText.setAttribute('fill', 'white');
                startChineseText.setAttribute('font-family', chineseFontFamily);
                startChineseText.setAttribute('font-weight', 'bold');
                startChineseText.textContent = startChinese;
                svg.appendChild(startChineseText);
            }

            const dash = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            dash.setAttribute('x', dashX);
            dash.setAttribute('y', chineseY);
            dash.setAttribute('dominant-baseline', 'middle');
            dash.setAttribute('font-size', chineseFontSize + 'px');
            dash.setAttribute('fill', 'white');
            dash.setAttribute('font-family', chineseFontFamily);
            dash.setAttribute('font-weight', 'bold');
            dash.textContent = '—';
            svg.appendChild(dash);

            if (endChinese) {
                const endChineseText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                endChineseText.setAttribute('x', endChineseX);
                endChineseText.setAttribute('y', chineseY);
                endChineseText.setAttribute('dominant-baseline', 'middle');
                endChineseText.setAttribute('font-size', chineseFontSize + 'px');
                endChineseText.setAttribute('fill', 'white');
                endChineseText.setAttribute('font-family', chineseFontFamily);
                endChineseText.setAttribute('font-weight', 'bold');
                endChineseText.textContent = endChinese;
                svg.appendChild(endChineseText);
            }

            if (startEnglish && endEnglish) {
                const startEn = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                startEn.setAttribute('x', startChineseX);
                startEn.setAttribute('y', englishY);
                startEn.setAttribute('dominant-baseline', 'hanging');
                startEn.setAttribute('font-size', englishFontSize + 'px');
                startEn.setAttribute('fill', 'white');
                startEn.setAttribute('font-family', englishFontFamily);
                startEn.setAttribute('font-weight', 'bold');
                startEn.setAttribute('textLength', startChineseWidth);
                startEn.setAttribute('lengthAdjust', 'spacing');
                startEn.setAttribute('xml:space', 'preserve');
                startEn.textContent = preservedStartEnglish;
                svg.appendChild(startEn);

                const dashEnWidth = getTextWidth('—', englishFontSize, englishFontFamily);
                const dashEnX = (startChineseX + startChineseWidth + endChineseX) / 2 - dashEnWidth / 2;
                const dashEn = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                dashEn.setAttribute('x', dashEnX);
                dashEn.setAttribute('y', englishY);
                dashEn.setAttribute('dominant-baseline', 'hanging');
                dashEn.setAttribute('font-size', englishFontSize + 'px');
                dashEn.setAttribute('fill', 'white');
                dashEn.setAttribute('font-family', chineseFontFamily);
                dashEn.setAttribute('font-weight', 'bold');
                dashEn.textContent = '—';
                svg.appendChild(dashEn);

                const endEn = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                endEn.setAttribute('x', endChineseX + endChineseWidth);
                endEn.setAttribute('y', englishY);
                endEn.setAttribute('text-anchor', 'end');
                endEn.setAttribute('dominant-baseline', 'hanging');
                endEn.setAttribute('font-size', englishFontSize + 'px');
                endEn.setAttribute('fill', 'white');
                endEn.setAttribute('font-family', englishFontFamily);
                endEn.setAttribute('font-weight', 'bold');
                endEn.setAttribute('textLength', endChineseWidth);
                endEn.setAttribute('lengthAdjust', 'spacing');
                endEn.setAttribute('xml:space', 'preserve');
                endEn.textContent = preservedEndEnglish;
                svg.appendChild(endEn);
            } else if (startEnglish && !endEnglish) {
                const startEn = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                startEn.setAttribute('x', startChineseX);
                startEn.setAttribute('y', englishY);
                startEn.setAttribute('dominant-baseline', 'hanging');
                startEn.setAttribute('font-size', englishFontSize + 'px');
                startEn.setAttribute('fill', 'white');
                startEn.setAttribute('font-family', englishFontFamily);
                startEn.setAttribute('font-weight', 'bold');
                startEn.setAttribute('textLength', startChineseWidth);
                startEn.setAttribute('lengthAdjust', 'spacing');
                startEn.setAttribute('xml:space', 'preserve');
                startEn.textContent = preservedStartEnglish;
                svg.appendChild(startEn);
            } else if (!startEnglish && endEnglish) {
                const endEn = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                endEn.setAttribute('x', endChineseX + endChineseWidth);
                endEn.setAttribute('y', englishY);
                endEn.setAttribute('text-anchor', 'end');
                endEn.setAttribute('dominant-baseline', 'hanging');
                endEn.setAttribute('font-size', englishFontSize + 'px');
                endEn.setAttribute('fill', 'white');
                endEn.setAttribute('font-family', englishFontFamily);
                endEn.setAttribute('font-weight', 'bold');
                endEn.setAttribute('textLength', endChineseWidth);
                endEn.setAttribute('lengthAdjust', 'spacing');
                endEn.setAttribute('xml:space', 'preserve');
                endEn.textContent = preservedEndEnglish;
                svg.appendChild(endEn);
            }

            const lineNoGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            lineNoGroup.setAttribute('transform', `translate(768.75,111.09) scale(0.93,1)`);
            const lineNoText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            lineNoText.setAttribute('x', '0');
            lineNoText.setAttribute('y', '0');
            lineNoText.setAttribute('text-anchor', 'middle');
            lineNoText.setAttribute('dominant-baseline', 'middle');
            lineNoText.setAttribute('font-size', lineNoFontSize + 'px');
            lineNoText.setAttribute('font-weight', 'bold');
            lineNoText.setAttribute('fill', 'white');
            lineNoText.setAttribute('font-family', lineNoFontFamily);
            lineNoText.setAttribute('letter-spacing', '0.02em');
            lineNoText.setAttribute('line-height', '40pt');
            lineNoText.textContent = lineNo;
            lineNoGroup.appendChild(lineNoText);
            svg.appendChild(lineNoGroup);
        }

        function updateDisplay() {
            redrawCanvas();
            updateTextLayer();
        }

        newStationInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addStation();
        });

        startChineseInput.addEventListener('input', updateDisplay);
        startEnglishInput.addEventListener('input', updateDisplay);
        endChineseInput.addEventListener('input', updateDisplay);
        endEnglishInput.addEventListener('input', updateDisplay);
        lineNoInput.addEventListener('input', updateDisplay);

        window.addEventListener('load', () => {
            mainStation.name = startChineseInput.value;
            subStation = { 
                name: endChineseInput.value, 
                metroLines: [4], 
                isBRT: false 
            };
            renderStationsList();
            updateDisplay();
            // 移动端初始缩放调整
            if (window.innerWidth <= 768) {
                scale = 0.5;
                // 粗略居中
                translateX = (window.innerWidth * 0.5 - 2415 * 0.5) / 1;
                translateY = 0;
            }
            applyTransform();
        });

        window.exportSave = function() {
            const saveData = {
                lineNo: lineNoInput.value,
                startChinese: startChineseInput.value,
                startEnglish: startEnglishInput.value,
                endChinese: endChineseInput.value,
                endEnglish: endEnglishInput.value,
                mainStation: mainStation,
                subStation: subStation,
                stations: stations,
                scale: scale,
                translateX: translateX,
                translateY: translateY
            };
            const dataStr = JSON.stringify(saveData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '线路图存档.json';
            a.click();
            URL.revokeObjectURL(url);
        };

        window.importSave = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    lineNoInput.value = data.lineNo || 'B53';
                    startChineseInput.value = data.startChinese || '大坝公交车场';
                    startEnglishInput.value = data.startEnglish || 'Daba Bus Station';
                    endChineseInput.value = data.endChinese || '地铁燕山立交桥站';
                    endEnglishInput.value = data.endEnglish || 'Yanshan Flyover Metro Station';
                    mainStation = data.mainStation || { name: '主站', metroLines: [], isBRT: false };
                    subStation = data.subStation || { name: '副站', metroLines: [], isBRT: false };
                    stations = data.stations || [];
                    scale = data.scale !== undefined ? data.scale : 1.0;
                    translateX = data.translateX !== undefined ? data.translateX : 0;
                    translateY = data.translateY !== undefined ? data.translateY : 0;
                    renderStationsList();
                    updateDisplay();
                    applyTransform();
                } catch (err) {
                    alert('存档文件格式错误');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        };
    </script>
