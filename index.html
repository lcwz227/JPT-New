<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>济南公交新版线路图生成器 v1.0.0</title>
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        /* 样式保持不变，省略以节省篇幅，实际使用时请保留完整样式 */
        /* 请从之前提供的完整代码中复制所有样式 */
    </style>
</head>
<body>
    <!-- 内容保持不变，省略 -->
    <!-- 请从之前提供的完整代码中复制所有 HTML 内容 -->
    <script>
        // 所有变量声明和函数保持不变，只替换触摸事件监听部分

        // ... 之前的代码 ...

        // 鼠标事件监听（保持不变）
        canvasArea.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            e.preventDefault();
            isDraggingCanvas = true;
            canvasArea.classList.add('dragging');
            startTranslateX = translateX;
            startTranslateY = translateY;
            startMouseX = e.clientX;
            startMouseY = e.clientY;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDraggingCanvas) return;
            const dx = e.clientX - startMouseX;
            const dy = e.clientY - startMouseY;
            translateX = startTranslateX + dx;
            translateY = startTranslateY + dy;
            applyTransform();
        });

        document.addEventListener('mouseup', () => {
            isDraggingCanvas = false;
            canvasArea.classList.remove('dragging');
        });

        // 触摸事件监听（修复版）
        canvasArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            if (touch) {
                isDraggingCanvas = true;
                canvasArea.classList.add('dragging');
                startTranslateX = translateX;
                startTranslateY = translateY;
                startMouseX = touch.clientX;
                startMouseY = touch.clientY;
            }
        }, { passive: false });

        canvasArea.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDraggingCanvas) return;
            const touch = e.touches[0];
            if (touch) {
                const dx = touch.clientX - startMouseX;
                const dy = touch.clientY - startMouseY;
                translateX = startTranslateX + dx;
                translateY = startTranslateY + dy;
                applyTransform();
            }
        }, { passive: false });

        canvasArea.addEventListener('touchend', (e) => {
            e.preventDefault();
            isDraggingCanvas = false;
            canvasArea.classList.remove('dragging');
        }, { passive: false });

        canvasArea.addEventListener('touchcancel', (e) => {
            e.preventDefault();
            isDraggingCanvas = false;
            canvasArea.classList.remove('dragging');
        }, { passive: false });

        // ... 其余代码保持不变 ...
    </script>
</body>
</html>
