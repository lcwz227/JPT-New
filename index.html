<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>济南公交新版线路图生成器 v1.0.0</title>
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        /* 样式完全保持不变，与之前相同（此处省略以节省篇幅，请复制原样式） */
        @font-face {
            font-family: 'Arial Black';
            src: url('ariblk.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Source Han Sans Bold';
            src: url('SourceHansansSC-Bold-2.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #2d2d2d;
            overflow: hidden;
        }
        .control-panel-wrapper {
            position: relative;
            height: 100vh;
            display: flex;
            flex-shrink: 0;
            transition: width 0.2s;
            width: 520px;
            z-index: 200;
            touch-action: pan-y;
        }
        .control-panel-wrapper.collapsed {
            width: 50px;
        }
        .control-panel-wrapper.collapsed .control-panel {
            display: none;
        }
        .control-panel-wrapper.collapsed .collapsed-tab {
            display: flex;
        }
        .collapsed-tab {
            width: 50px;
            height: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(2px);
            border-right: 1px solid rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            cursor: pointer;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            touch-action: pan-y;
        }
        .collapsed-tab span {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 18px;
            font-weight: bold;
            color: #1e2b3a;
            margin-top: 20px;
        }
        .control-panel {
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(2px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            border-right: 1px solid rgba(255,255,255,0.2);
            box-shadow: 4px 0 20px rgba(0,0,0,0.5);
            touch-action: pan-y;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .collapse-btn {
            background: #2a7de1;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .panel-title {
            font-weight: bold;
            font-size: 16px;
            color: #1e2b3a;
        }
        .resize-handle {
            width: 8px;
            height: 30px;
            background: #ccc;
            border-radius: 4px;
            cursor: ew-resize;
            opacity: 0.6;
            transition: 0.2s;
            touch-action: none;
        }
        .resize-handle:hover {
            opacity: 1;
            background: #2a7de1;
        }
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 2px solid #2a7de1;
            padding-bottom: 8px;
        }
        .tab-btn {
            padding: 8px 16px;
            background: #e0e7ff;
            border: none;
            border-radius: 20px 20px 0 0;
            cursor: pointer;
            font-weight: 600;
            color: #1e2b3a;
            transition: 0.2s;
            touch-action: manipulation;
        }
        .tab-btn.active {
            background: #2a7de1;
            color: white;
        }
        .tab-page { display: block; }
        .tab-page.hidden { display: none; }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 15px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 13px;
            color: #3a4a5a;
            text-transform: uppercase;
        }
        .input-group input, .input-group select {
            padding: 10px 12px;
            border: 1px solid #ccd7e4;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            touch-action: manipulation;
        }
        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: white;
            color: #1e2b3a;
            border: 1px solid #cbd5e1;
            touch-action: manipulation;
        }
        .btn-add {
            background: #2a7de1;
            color: white;
            border: none;
        }
        .btn-clear {
            background: #f1f5f9;
            color: #475569;
        }
        .btn-disabled {
            background: #aaa;
            color: #eee;
            cursor: not-allowed;
            border: 1px solid #888;
            pointer-events: auto;
        }
        hr {
            border: 1px solid #e9eef2;
            width: 100%;
            margin: 8px 0;
        }
        .stations-list {
            border-radius: 18px;
            padding: 16px 12px;
            background: #f8fafc;
            border: 1px solid #dee7ef;
            overflow-y: auto;
            max-height: 500px;
            touch-action: pan-y;
        }
        .stations-list-header {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 12px;
        }
        .station-item {
            display: flex;
            flex-direction: column;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 16px;
            gap: 8px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            cursor: default;
            touch-action: pan-y;
        }
        .station-item.main { background-color: #e6f7e6; }
        .station-item.sub { background-color: #e6f0ff; }
        .station-item.middle { background-color: white; }
        .station-item.middle { cursor: grab; }
        .station-item.middle:active { cursor: grabbing; }
        .station-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .station-name-input {
            flex: 2;
            min-width: 140px;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 30px;
            font-size: 14px;
            background: white;
            color: black;
            pointer-events: auto;
            cursor: text;
            touch-action: manipulation;
        }
        .direction-buttons {
            display: flex;
            gap: 4px;
        }
        .dir-btn {
            background: none;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            width: 36px;
            height: 36px;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            background: white;
            touch-action: manipulation;
        }
        .dir-btn.active {
            background: #2a7de1;
            color: white;
            border-color: #2a7de1;
        }
        .metro-section {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 40px;
            overflow-x: auto;
            touch-action: pan-x;
        }
        .metro-label {
            font-weight: bold;
            color: #1e2b3a;
            margin-right: 4px;
            font-size: 13px;
            white-space: nowrap;
        }
        .metro-checkbox {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 13px;
            white-space: nowrap;
        }
        .metro-checkbox input {
            width: 16px;
            height: 16px;
            margin: 0;
        }
        .brt-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }
        .brt-checkbox {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
        }
        .brt-checkbox input {
            width: 18px;
            height: 18px;
        }
        .btn-delete {
            background: none;
            border: none;
            color: #f43f5e;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            padding: 0 6px;
            border-radius: 30px;
            margin-left: auto;
            touch-action: manipulation;
        }
        .btn-delete:hover {
            background: #fee2e2;
        }
        .batch-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            align-items: center;
        }
        .batch-input {
            flex: 1;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        .canvas-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: #2d2d2d;
            cursor: grab;
            touch-action: none; /* 禁用默认触摸行为，由外部脚本控制 */
        }
        .canvas-area.dragging {
            cursor: grabbing;
        }
        #map-container {
            position: absolute;
            left: 0;
            top: 0;
            width: 2415px;
            height: 689px;
            margin: 0;
            transform-origin: 0 0;
            transition: transform 0.1s;
            will-change: transform;
        }
        #bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 2415px;
            height: 689px;
            z-index: 1;
            user-select: none;
            pointer-events: none;
        }
        #route-svg { display: none; }
        #text-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 2415px;
            height: 689px;
            z-index: 90;
            pointer-events: none;
        }
        .station-marker {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }
        .station-icon {
            width: 32px;
            height: 32px;
            display: block;
        }
        .station-label {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-family: 'Source Han Sans Bold', '思源黑体 Bold', 'Noto Sans CJK SC Bold', 'Microsoft YaHei', sans-serif;
            font-weight: bold;
            font-size: 25.72px;
            color: black;
            white-space: nowrap;
            background: none;
            border: none;
            padding: 0;
            line-height: 1.2;
            margin-top: 4px;
        }
        .brt-marker {
            width: 32px;
            height: 26px;
            margin-top: 2px;
            object-fit: contain;
        }
        .metro-marker {
            position: absolute;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            z-index: 102;
            pointer-events: none;
        }
        .metro-marker img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .control-panel-wrapper {
                width: 100% !important;
                height: 60vh;
                max-height: 500px;
            }
            .resize-handle { display: none; }
            .control-panel { padding: 12px; gap: 10px; }
            .panel-header .panel-title { font-size: 14px; }
            .stations-list { max-height: 200px; }
            .station-name-input { font-size: 13px; padding: 6px 8px; }
            .dir-btn { width: 32px; height: 32px; font-size: 13px; }
            .metro-checkbox { font-size: 12px; }
            .btn { padding: 10px 12px; font-size: 13px; }
            .canvas-area { flex: 1; height: 40vh; }
        }
    </style>
</head>
<body>
    <div class="control-panel-wrapper" id="panelWrapper">
        <div class="collapsed-tab" id="collapsedTab" onclick="togglePanel()">
            <span>线路图</span>
        </div>
        <div class="control-panel" id="controlPanel">
            <div class="panel-header">
                <button class="collapse-btn" onclick="togglePanel()">◀</button>
                <span class="panel-title">济南公交新版线路图生成器 v1.0.0</span>
                <div class="resize-handle" id="resizeHandle"></div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" id="tabLineBtn">线路信息</button>
                <button class="tab-btn" id="tabStationBtn">站点信息</button>
            </div>
            <div id="linePage" class="tab-page">
                <h3 style="margin:0 0 10px;">线路信息</h3>
                <div class="input-group">
                    <label>线路号</label>
                    <input type="text" id="lineNo" value="B53">
                </div>
                <div class="input-group">
                    <label>主站</label>
                    <input type="text" id="startChinese" value="大坝公交车场">
                </div>
                <div class="input-group">
                    <label>主站英文</label>
                    <input type="text" id="startStation" value="Daba Bus Station">
                </div>
                <div class="input-group">
                    <label>副站</label>
                    <input type="text" id="endChinese" value="地铁燕山立交桥站">
                </div>
                <div class="input-group">
                    <label>副站英文</label>
                    <input type="text" id="endStation" value="Yanshan Flyover Metro Station">
                </div>
                <hr>
                <button class="btn btn-clear" onclick="clearAll()">清空重置</button>
            </div>
            <div id="stationPage" class="tab-page hidden">
                <h3 style="margin:0 0 10px;">站点列表 (拖拽中间站可排序)</h3>
                <div class="stations-list" id="stationsContainer"></div>
                <div style="margin-top:16px; display:flex; gap:8px;">
                    <input type="text" id="newStationName" placeholder="新中间站名" style="flex:1; padding:10px; border-radius:30px; border:1px solid #ccc;">
                    <button class="btn btn-add" onclick="addStation()">添加</button>
                </div>
                <div class="batch-row">
                    <input type="text" id="batchNames" class="batch-input" placeholder="批量添加 (用中文逗号分隔)">
                    <button class="btn btn-add" onclick="batchAdd()">批量添加</button>
                </div>
                <div style="margin-top:8px; display:flex; gap:8px;">
                    <button class="btn btn-clear" onclick="deleteAllStations()">删除全部中间站</button>
                </div>
                <div style="margin-top:16px; display:flex; gap:8px; flex-wrap:wrap;">
                    <button class="btn btn-disabled" id="exportBtn">导出PNG</button>
                    <button class="btn btn-add" onclick="exportSave()">导出存档</button>
                    <button class="btn btn-add" onclick="document.getElementById('importFile').click()">导入存档</button>
                    <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importSave(event)">
                </div>
            </div>
        </div>
    </div>
    <div class="canvas-area" id="canvasArea">
        <div id="map-container">
            <img id="bg-layer" src="background.png" alt="线路图背景">
            <svg id="text-svg"></svg>
            <svg id="route-svg" style="display:none"></svg>
        </div>
    </div>
    <script>
        // ---------- 全局变量 ----------
        const MAP_WIDTH = 2415;
        const MAP_HEIGHT = 689;
        const FIXED_START_X = 128;
        const FIXED_END_X = 2275;
        const FIXED_Y = 267;
        const METRO_BASE_Y = 229.5;
        const ICON_SIZE = 32;

        let stations = [];
        let mainStation = { name: '主站', metroLines: [], isBRT: false };
        let subStation = { name: '副站', metroLines: [], isBRT: false };

        const IMAGE_MAIN = 'zhuzhan.png';
        const IMAGE_SUB = 'fuzhan.png';
        const IMAGE_UP = 'shangxing.png';
        const IMAGE_DOWN = 'xiaxing.png';
        const IMAGE_BOTH = 'shuangxiang.png';
        const METRO_IMG = { 1:'line1.png', 2:'line2.png', 3:'line3.png', 4:'line4.png', 6:'line6.png', 8:'line8.png' };
        const BRT_IMG = 'BRT.png';

        // 画布变换参数
        let scale = 1.0;
        let translateX = 0;
        let translateY = 0;
        const MIN_SCALE = 0.1;
        const MAX_SCALE = 10;

        const canvasArea = document.getElementById('canvasArea');
        const mapContainer = document.getElementById('map-container');

        // 应用变换
        function applyTransform() {
            mapContainer.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        // ---------- 以下为其他功能（站点列表、存档等），与原代码一致 ----------
        const panelWrapper = document.getElementById('panelWrapper');
        const lineNoInput = document.getElementById('lineNo');
        const startChineseInput = document.getElementById('startChinese');
        const startEnglishInput = document.getElementById('startStation');
        const endChineseInput = document.getElementById('endChinese');
        const endEnglishInput = document.getElementById('endStation');
        const newStationInput = document.getElementById('newStationName');
        const stationsContainer = document.getElementById('stationsContainer');
        const tabLineBtn = document.getElementById('tabLineBtn');
        const tabStationBtn = document.getElementById('tabStationBtn');
        const linePage = document.getElementById('linePage');
        const stationPage = document.getElementById('stationPage');
        const resizeHandle = document.getElementById('resizeHandle');

        document.getElementById('exportBtn').addEventListener('click', e => {
            e.preventDefault();
            alert('该功能暂不开启');
        });

        window.togglePanel = () => {
            panelWrapper.classList.toggle('collapsed');
            const btn = document.querySelector('.collapse-btn');
            if (btn) btn.textContent = panelWrapper.classList.contains('collapsed') ? '▶' : '◀';
        };

        // 控制盘宽度拖拽
        let startX, startWidth;
        resizeHandle.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            startX = e.clientX;
            startWidth = panelWrapper.offsetWidth;
            document.addEventListener('pointermove', resizeMove);
            document.addEventListener('pointerup', resizeStop);
        });

        function resizeMove(e) {
            let newWidth = startWidth + (e.clientX - startX);
            newWidth = Math.min(800, Math.max(150, newWidth));
            panelWrapper.style.width = newWidth + 'px';
        }

        function resizeStop() {
            document.removeEventListener('pointermove', resizeMove);
            document.removeEventListener('pointerup', resizeStop);
        }

        // 选项卡
        tabLineBtn.addEventListener('click', () => {
            tabLineBtn.classList.add('active');
            tabStationBtn.classList.remove('active');
            linePage.classList.remove('hidden');
            stationPage.classList.add('hidden');
        });
        tabStationBtn.addEventListener('click', () => {
            tabStationBtn.classList.add('active');
            tabLineBtn.classList.remove('active');
            stationPage.classList.remove('hidden');
            linePage.classList.add('hidden');
            renderStationsList();
        });

        function renderStationsList() {
            const container = stationsContainer;
            container.innerHTML = '';

            const mainDiv = createStationItem('main', mainStation, true);
            container.appendChild(mainDiv);
            stations.forEach((s, i) => container.appendChild(createStationItem('middle', s, false, i)));
            container.appendChild(createStationItem('sub', subStation, true));

            new Sortable(container, {
                animation: 150,
                handle: '.station-item.middle',
                onEnd: (evt) => {
                    const oldIndex = evt.oldIndex - 1;
                    const newIndex = evt.newIndex - 1;
                    if (oldIndex === newIndex || oldIndex < 0 || newIndex < 0) return;
                    if (evt.newIndex === 0) {
                        // 成为主站
                        const moved = stations[oldIndex];
                        if (moved) {
                            const oldMain = { ...mainStation, direction: 'both' };
                            stations.splice(oldIndex, 1);
                            stations.splice(oldIndex, 0, oldMain);
                            mainStation = { ...moved };
                        }
                    } else if (evt.newIndex === stations.length + 1) {
                        // 成为副站
                        const moved = stations[oldIndex];
                        if (moved) {
                            const oldSub = { ...subStation, direction: 'both' };
                            stations.splice(oldIndex, 1);
                            stations.splice(oldIndex, 0, oldSub);
                            subStation = { ...moved };
                        }
                    } else {
                        // 中间站重排
                        const moved = stations.splice(oldIndex, 1)[0];
                        stations.splice(newIndex, 0, moved);
                    }
                    renderStationsList();
                    updateDisplay();
                }
            });
        }

        function createStationItem(type, data, isFixed, index) {
            const div = document.createElement('div');
            div.className = `station-item ${type}`;
            const row = document.createElement('div');
            row.className = 'station-row';

            const nameInput = document.createElement('input');
            nameInput.className = 'station-name-input';
            nameInput.value = data.name;
            nameInput.addEventListener('input', e => {
                data.name = e.target.value;
                updateDisplay();
            });
            row.appendChild(nameInput);

            if (type === 'middle') {
                const btnGroup = document.createElement('div');
                btnGroup.className = 'direction-buttons';
                ['上','下','双'].forEach((text, i) => {
                    const btn = document.createElement('button');
                    btn.className = `dir-btn ${(i===0 && data.direction==='up') || (i===1 && data.direction==='down') || (i===2 && data.direction==='both') ? 'active' : ''}`;
                    btn.innerHTML = text;
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        data.direction = i===0 ? 'up' : i===1 ? 'down' : 'both';
                        renderStationsList();
                        updateDisplay();
                    };
                    btnGroup.appendChild(btn);
                });
                row.appendChild(btnGroup);
                const del = document.createElement('button');
                del.className = 'btn-delete';
                del.innerHTML = '✕';
                del.onclick = (e) => {
                    e.stopPropagation();
                    stations.splice(index, 1);
                    renderStationsList();
                    updateDisplay();
                };
                row.appendChild(del);
            }
            div.appendChild(row);

            const metroDiv = document.createElement('div');
            metroDiv.className = 'metro-section';
            metroDiv.innerHTML = '<span class="metro-label">地铁换乘线:</span>';
            [1,2,3,4,6,8].forEach(ln => {
                const label = document.createElement('label');
                label.className = 'metro-checkbox';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = ln;
                cb.checked = data.metroLines.includes(ln);
                cb.addEventListener('change', () => {
                    if (cb.checked) data.metroLines = [...data.metroLines, ln];
                    else data.metroLines = data.metroLines.filter(v => v !== ln);
                    updateDisplay();
                });
                label.appendChild(cb);
                label.appendChild(document.createTextNode(ln));
                metroDiv.appendChild(label);
            });
            div.appendChild(metroDiv);

            const brtRow = document.createElement('div');
            brtRow.className = 'brt-row';
            const brtLabel = document.createElement('label');
            brtLabel.className = 'brt-checkbox';
            const brtCb = document.createElement('input');
            brtCb.type = 'checkbox';
            brtCb.checked = data.isBRT || false;
            brtCb.addEventListener('change', () => {
                data.isBRT = brtCb.checked;
                updateDisplay();
            });
            brtLabel.appendChild(brtCb);
            brtLabel.appendChild(document.createTextNode('BRT站点'));
            brtRow.appendChild(brtLabel);
            div.appendChild(brtRow);
            return div;
        }

        window.addStation = () => {
            const name = newStationInput.value.trim();
            if (name) {
                stations.push({ name, direction: 'both', metroLines: [], isBRT: false });
                newStationInput.value = '';
                renderStationsList();
                updateDisplay();
            }
        };

        window.batchAdd = () => {
            const namesStr = document.getElementById('batchNames').value.trim();
            if (!namesStr) return;
            namesStr.split(/[,，]\s*/).map(s => s.trim()).filter(s => s).forEach(name => {
                stations.push({ name, direction: 'both', metroLines: [], isBRT: false });
            });
            document.getElementById('batchNames').value = '';
            renderStationsList();
            updateDisplay();
        };

        window.deleteAllStations = () => {
            if (confirm('确定要删除所有中间站吗？')) {
                stations = [];
                renderStationsList();
                updateDisplay();
            }
        };

        window.clearAll = () => {
            if (confirm('确定要清空所有内容吗？')) {
                stations = [];
                mainStation = { name: '主站', metroLines: [], isBRT: false };
                subStation = { name: '副站', metroLines: [4], isBRT: false };
                lineNoInput.value = 'B53';
                startChineseInput.value = '大坝公交车场';
                startEnglishInput.value = 'Daba Bus Station';
                endChineseInput.value = '地铁燕山立交桥站';
                endEnglishInput.value = 'Yanshan Flyover Metro Station';
                renderStationsList();
                updateDisplay();
            }
        };

        function redrawCanvas() {
            const mapContainer = document.getElementById('map-container');
            const old = mapContainer.querySelectorAll('.station-marker, .metro-marker');
            old.forEach(m => m.remove());

            const startName = startEnglishInput.value;
            const endName = endEnglishInput.value;
            const drawList = [
                { type:'main', name:mainStation.name, x:FIXED_START_X, metroLines:mainStation.metroLines, isBRT:mainStation.isBRT },
                ...stations.map(s => ({ type:'middle', name:s.name, direction:s.direction, x:null, metroLines:s.metroLines, isBRT:s.isBRT })),
                { type:'sub', name:subStation.name, x:FIXED_END_X, metroLines:subStation.metroLines, isBRT:subStation.isBRT }
            ];

            const middleIndices = drawList.reduce((acc,item,i) => item.type==='middle' ? [...acc,i] : acc, []);
            const startExists = startName !== '';
            const endExists = endName !== '';
            if (middleIndices.length > 0) {
                const left = startExists ? FIXED_START_X : 40;
                const right = endExists ? FIXED_END_X : MAP_WIDTH - 40;
                middleIndices.forEach((idx, i) => {
                    drawList[idx].x = left + (right - left) * (i+1)/(middleIndices.length+1);
                });
            }

            drawList.forEach(item => {
                if (item.x === null) return;
                const marker = document.createElement('div');
                marker.className = 'station-marker';
                marker.style.left = (item.x - ICON_SIZE/2) + 'px';
                marker.style.top = (FIXED_Y - ICON_SIZE/2) + 'px';

                let imgSrc = '';
                if (item.type === 'main') imgSrc = IMAGE_MAIN;
                else if (item.type === 'sub') imgSrc = IMAGE_SUB;
                else {
                    imgSrc = item.direction === 'up' ? IMAGE_UP : item.direction === 'down' ? IMAGE_DOWN : IMAGE_BOTH;
                }
                const icon = document.createElement('img');
                icon.className = 'station-icon';
                icon.src = imgSrc;
                icon.alt = item.name;
                marker.appendChild(icon);

                const label = document.createElement('div');
                label.className = 'station-label';
                label.textContent = item.name;
                marker.appendChild(label);

                if (item.isBRT) {
                    const brt = document.createElement('img');
                    brt.className = 'brt-marker';
                    brt.src = BRT_IMG;
                    brt.alt = 'BRT';
                    marker.appendChild(brt);
                }
                mapContainer.appendChild(marker);

                // 地铁标志
                const lines = item.metroLines || [];
                lines.forEach((lineNum, idx) => {
                    const metroY = METRO_BASE_Y - 37 * (lines.length - 1 - idx);
                    const metro = document.createElement('div');
                    metro.className = 'metro-marker';
                    metro.style.left = item.x + 'px';
                    metro.style.top = metroY + 'px';
                    const metroImg = document.createElement('img');
                    metroImg.src = METRO_IMG[lineNum];
                    metroImg.alt = `line${lineNum}`;
                    metro.appendChild(metroImg);
                    mapContainer.appendChild(metro);
                });
            });
        }

        function getTextWidth(text, fontSize, fontFamily) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.font = `${fontSize}px ${fontFamily}`;
            return ctx.measureText(text).width;
        }

        function updateTextLayer() {
            const svg = document.getElementById('text-svg');
            svg.innerHTML = '';

            const startCh = startChineseInput.value || '';
            const endCh = endChineseInput.value || '';
            const startEn = startEnglishInput.value || '';
            const endEn = endEnglishInput.value || '';
            const lineNo = lineNoInput.value || 'B53';

            const chFont = '"Source Han Sans Bold", "思源黑体 Bold", "Noto Sans CJK SC Bold", "Microsoft YaHei", sans-serif';
            const enFont = '"Source Han Sans Bold", "思源黑体 Bold", "Noto Sans CJK SC Bold", "Microsoft YaHei", sans-serif';
            const lineFont = '"Arial Black", "Arial Black", sans-serif';

            const chSize = 53, enSize = 22, lineSize = 90;
            const startW = getTextWidth(startCh, chSize, chFont);
            const endW = getTextWidth(endCh, chSize, chFont);
            const dashW = getTextWidth('—', chSize, chFont);
            const gap = 10;
            const x0 = 949;
            const yCh = 97;
            const dashX = x0 + startW + gap;
            const endX = dashX + dashW + gap;
            const yEn = 121;

            const preservedStart = startEn.replace(/ /g, '\u00A0');
            const preservedEnd = endEn.replace(/ /g, '\u00A0');

            if (startCh) {
                const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                t.setAttribute('x', x0); t.setAttribute('y', yCh); t.setAttribute('dominant-baseline', 'middle');
                t.setAttribute('font-size', chSize+'px'); t.setAttribute('fill', 'white');
                t.setAttribute('font-family', chFont); t.setAttribute('font-weight', 'bold');
                t.textContent = startCh; svg.appendChild(t);
            }
            const dash = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            dash.setAttribute('x', dashX); dash.setAttribute('y', yCh); dash.setAttribute('dominant-baseline', 'middle');
            dash.setAttribute('font-size', chSize+'px'); dash.setAttribute('fill', 'white');
            dash.setAttribute('font-family', chFont); dash.setAttribute('font-weight', 'bold');
            dash.textContent = '—'; svg.appendChild(dash);

            if (endCh) {
                const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                t.setAttribute('x', endX); t.setAttribute('y', yCh); t.setAttribute('dominant-baseline', 'middle');
                t.setAttribute('font-size', chSize+'px'); t.setAttribute('fill', 'white');
                t.setAttribute('font-family', chFont); t.setAttribute('font-weight', 'bold');
                t.textContent = endCh; svg.appendChild(t);
            }

            if (startEn && endEn) {
                const startT = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                startT.setAttribute('x', x0); startT.setAttribute('y', yEn); startT.setAttribute('dominant-baseline', 'hanging');
                startT.setAttribute('font-size', enSize+'px'); startT.setAttribute('fill', 'white');
                startT.setAttribute('font-family', enFont); startT.setAttribute('font-weight', 'bold');
                startT.setAttribute('textLength', startW); startT.setAttribute('lengthAdjust', 'spacing');
                startT.setAttribute('xml:space', 'preserve');
                startT.textContent = preservedStart; svg.appendChild(startT);

                const dashEnW = getTextWidth('—', enSize, enFont);
                const dashEnX = (x0 + startW + endX) / 2 - dashEnW / 2;
                const dashEn = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                dashEn.setAttribute('x', dashEnX); dashEn.setAttribute('y', yEn); dashEn.setAttribute('dominant-baseline', 'hanging');
                dashEn.setAttribute('font-size', enSize+'px'); dashEn.setAttribute('fill', 'white');
                dashEn.setAttribute('font-family', chFont); dashEn.setAttribute('font-weight', 'bold');
                dashEn.textContent = '—'; svg.appendChild(dashEn);

                const endT = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                endT.setAttribute('x', endX + endW); endT.setAttribute('y', yEn); endT.setAttribute('text-anchor', 'end');
                endT.setAttribute('dominant-baseline', 'hanging'); endT.setAttribute('font-size', enSize+'px');
                endT.setAttribute('fill', 'white'); endT.setAttribute('font-family', enFont); endT.setAttribute('font-weight', 'bold');
                endT.setAttribute('textLength', endW); endT.setAttribute('lengthAdjust', 'spacing');
                endT.setAttribute('xml:space', 'preserve');
                endT.textContent = preservedEnd; svg.appendChild(endT);
            } else if (startEn) {
                const startT = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                startT.setAttribute('x', x0); startT.setAttribute('y', yEn); startT.setAttribute('dominant-baseline', 'hanging');
                startT.setAttribute('font-size', enSize+'px'); startT.setAttribute('fill', 'white');
                startT.setAttribute('font-family', enFont); startT.setAttribute('font-weight', 'bold');
                startT.setAttribute('textLength', startW); startT.setAttribute('lengthAdjust', 'spacing');
                startT.setAttribute('xml:space', 'preserve');
                startT.textContent = preservedStart; svg.appendChild(startT);
            } else if (endEn) {
                const endT = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                endT.setAttribute('x', endX + endW); endT.setAttribute('y', yEn); endT.setAttribute('text-anchor', 'end');
                endT.setAttribute('dominant-baseline', 'hanging'); endT.setAttribute('font-size', enSize+'px');
                endT.setAttribute('fill', 'white'); endT.setAttribute('font-family', enFont); endT.setAttribute('font-weight', 'bold');
                endT.setAttribute('textLength', endW); endT.setAttribute('lengthAdjust', 'spacing');
                endT.setAttribute('xml:space', 'preserve');
                endT.textContent = preservedEnd; svg.appendChild(endT);
            }

            const lineGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            lineGroup.setAttribute('transform', `translate(768.75,111.09) scale(0.93,1)`);
            const lineText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            lineText.setAttribute('x', '0'); lineText.setAttribute('y', '0'); lineText.setAttribute('text-anchor', 'middle');
            lineText.setAttribute('dominant-baseline', 'middle'); lineText.setAttribute('font-size', lineSize+'px');
            lineText.setAttribute('font-weight', 'bold'); lineText.setAttribute('fill', 'white');
            lineText.setAttribute('font-family', lineFont); lineText.setAttribute('letter-spacing', '0.02em');
            lineText.setAttribute('line-height', '40pt');
            lineText.textContent = lineNo;
            lineGroup.appendChild(lineText);
            svg.appendChild(lineGroup);
        }

        function updateDisplay() { redrawCanvas(); updateTextLayer(); }

        newStationInput.addEventListener('keypress', e => e.key === 'Enter' && addStation());
        startChineseInput.addEventListener('input', updateDisplay);
        startEnglishInput.addEventListener('input', updateDisplay);
        endChineseInput.addEventListener('input', updateDisplay);
        endEnglishInput.addEventListener('input', updateDisplay);
        lineNoInput.addEventListener('input', updateDisplay);

        // 自动检测设备并加载对应的交互脚本
        function loadScript(src) {
            const script = document.createElement('script');
            script.src = src;
            script.async = false; // 确保顺序执行
            document.body.appendChild(script);
        }

        window.addEventListener('load', () => {
            mainStation.name = startChineseInput.value;
            subStation = { name: endChineseInput.value, metroLines: [4], isBRT: false };
            renderStationsList();
            updateDisplay();
            if (window.innerWidth <= 768) {
                scale = 0.5;
                translateX = (window.innerWidth * 0.5 - 2415 * 0.5) / 1;
                translateY = 0;
                applyTransform();
            }

            // 根据触摸能力加载对应脚本
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                loadScript('phonetouch.js');   // 手机/平板
            } else {
                loadScript('cmputertouch.js'); // 电脑
            }
        });

        window.exportSave = () => {
            const data = { lineNo:lineNoInput.value, startChinese:startChineseInput.value, startEnglish:startEnglishInput.value,
                endChinese:endChineseInput.value, endEnglish:endEnglishInput.value, mainStation, subStation, stations, scale, translateX, translateY };
            const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '线路图存档.json';
            a.click();
            URL.revokeObjectURL(a.href);
        };

        window.importSave = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    lineNoInput.value = data.lineNo || 'B53';
                    startChineseInput.value = data.startChinese || '大坝公交车场';
                    startEnglishInput.value = data.startEnglish || 'Daba Bus Station';
                    endChineseInput.value = data.endChinese || '地铁燕山立交桥站';
                    endEnglishInput.value = data.endEnglish || 'Yanshan Flyover Metro Station';
                    mainStation = data.mainStation || { name: '主站', metroLines: [], isBRT: false };
                    subStation = data.subStation || { name: '副站', metroLines: [], isBRT: false };
                    stations = data.stations || [];
                    scale = data.scale ?? 1.0;
                    translateX = data.translateX ?? 0;
                    translateY = data.translateY ?? 0;
                    renderStationsList();
                    updateDisplay();
                    applyTransform();
                } catch { alert('存档文件格式错误'); }
            };
            reader.readAsText(file);
            event.target.value = '';
        };
    </script>
</body>
